version: '3.8'

services:
  # ---------------------------------------------------------
  # 1. FRONTEND & GATEWAY
  # ---------------------------------------------------------
  frontend-vue:
    image: node:22-alpine
    container_name: auto_frontend_vue
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173" # Puerto expuesto para los vendedores
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - public_net

  nginx-gateway:
    image: nginx:alpine
    container_name: auto_api_gateway
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ms-prospectos
    networks:
      - public_net
      - private_net

  # ---------------------------------------------------------
  # 2. MICROSERVICIOS (LARAVEL)
  # ---------------------------------------------------------
  ms-prospectos:
    build:
      context: ./backend/ms-prospectos
      dockerfile: Dockerfile
    container_name: auto_ms_prospectos
    ports:
      - "8001:8000"
    volumes:
      - ./backend/ms-prospectos:/app
      - /app/vendor
    networks:
      - private_net
    env_file:
      ./backend/ms-prospectos/.env

  # ---------------------------------------------------------
  # 3. PERSISTENCIA & AUTOMATIZACIÓN
  # ---------------------------------------------------------
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: auto_oracle_23ai
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PWD=TuPasswordSeguro123
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - private_net

  n8n:
    image: n8nio/n8n
    container_name: auto_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - private_net

# ---------------------------------------------------------
# DEFINICIÓN DE REDES Y VOLÚMENES
# ---------------------------------------------------------
networks:
  public_net:
    driver: bridge
  private_net:
    driver: bridge

volumes:
  oracle_data:
  n8n_data: